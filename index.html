<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Organigramme interactif — Kit RH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Syne:wght@500;600;700&family=Spectral:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--ink:#0C0F14;--ink2:#1C2331;--ivory:#F7F4EE;--ivory2:#EDE9DF;--gold:#C4973A;--verm:#B8341B;--mist:#7A8796;--steel:#3A4A5C;--rule:rgba(12,15,20,.1);--card-w:158px;--cmp-w:230px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Syne',sans-serif;background:var(--ivory);color:var(--ink)}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:900;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");opacity:.45}

/* TOPBAR */
.topbar{height:48px;background:var(--ink);display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid rgba(196,151,58,.2);position:relative;z-index:200;flex-shrink:0}
.topbar-logo{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--gold);letter-spacing:.3px;display:flex;align-items:center;gap:10px}
.topbar-logo::after{content:'';width:1px;height:16px;background:rgba(196,151,58,.3)}
.topbar-subtitle{font-family:'Syne',sans-serif;font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:rgba(247,244,238,.3)}
#ts{font-family:'Spectral',serif;font-size:11px;font-style:italic;color:rgba(247,244,238,.3)}

/* NAV */
.nav{background:var(--ink2);padding:0 20px;height:42px;display:none;align-items:center;gap:4px;border-bottom:1px solid rgba(247,244,238,.07);position:relative;z-index:190;flex-shrink:0;flex-wrap:wrap}
.nav-lbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(247,244,238,.25);margin-right:6px;flex-shrink:0}
.nbtn{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;padding:5px 12px;border:none;cursor:pointer;background:transparent;color:rgba(247,244,238,.4);transition:all .15s;flex-shrink:0;border-bottom:2px solid transparent}
.nbtn:hover{color:rgba(247,244,238,.8)}
.nbtn.on{color:var(--gold);border-bottom-color:var(--gold)}
.sep{width:1px;height:16px;background:rgba(247,244,238,.08);margin:0 4px;flex-shrink:0}
.reload-btn{margin-left:auto;font-family:'Syne',sans-serif;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;background:transparent;border:1px solid rgba(247,244,238,.15);color:rgba(247,244,238,.35);cursor:pointer;flex-shrink:0;transition:all .15s}
.reload-btn:hover{border-color:rgba(247,244,238,.4);color:rgba(247,244,238,.7)}
.srch{margin-left:8px}
.srch input{font-family:'Syne',sans-serif;font-size:10px;letter-spacing:.5px;padding:4px 14px;border:1px solid rgba(247,244,238,.12);background:rgba(247,244,238,.05);color:var(--ivory);outline:none;width:180px}
.srch input::placeholder{color:rgba(247,244,238,.25)}
.srch input:focus{border-color:rgba(196,151,58,.4);background:rgba(247,244,238,.08)}

/* LEGEND + STATS */
.legend{background:var(--ivory2);padding:5px 20px;display:none;align-items:center;gap:16px;border-bottom:1px solid var(--rule);flex-shrink:0;flex-wrap:wrap}
.li{display:flex;align-items:center;gap:6px}
.ld{width:9px;height:9px;flex-shrink:0;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)}
.li-label{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--mist)}
.statsbar{background:var(--ivory);padding:4px 20px;display:none;align-items:center;gap:20px;border-bottom:1px solid var(--rule);flex-shrink:0}
.statsbar span{font-size:10px;color:var(--mist)}
.statsbar b{font-family:'Playfair Display',serif;color:var(--ink);font-size:14px}

/* ZOOM */
.zbar{background:var(--ink);padding:5px 20px;display:none;align-items:center;gap:8px;border-bottom:1px solid rgba(247,244,238,.06);flex-shrink:0}
.zbtn{width:24px;height:24px;background:rgba(247,244,238,.07);border:1px solid rgba(247,244,238,.12);color:var(--ivory);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.zbtn:hover{background:rgba(247,244,238,.14)}
.zlvl{font-family:'Playfair Display',serif;font-size:13px;color:var(--gold);min-width:38px;text-align:center}
.zhint{font-size:9px;color:rgba(247,244,238,.2);letter-spacing:.5px;margin-left:4px}

/* UPLOAD */
.upload-zone{flex:1;display:flex;align-items:center;justify-content:center;background:var(--ivory);position:relative;overflow:hidden}
.upload-zone::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(12,15,20,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(12,15,20,.04) 1px,transparent 1px);background-size:48px 48px}
.upload-box{position:relative;z-index:2;border:1.5px dashed rgba(12,15,20,.18);padding:56px 72px;text-align:center;cursor:pointer;max-width:480px;width:100%;transition:all .2s;background:rgba(247,244,238,.7);backdrop-filter:blur(8px)}
.upload-box:hover,.upload-box.dragover{border-color:var(--gold);background:rgba(247,244,238,.9);box-shadow:0 8px 40px rgba(196,151,58,.1)}
.upload-icon{font-family:'Playfair Display',serif;font-size:52px;color:var(--gold);opacity:.6;margin-bottom:20px;display:block;line-height:1}
.upload-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink);margin-bottom:10px}
.upload-sub{font-family:'Spectral',serif;font-size:14px;font-weight:300;line-height:1.7;color:var(--mist);margin-bottom:24px}
.upload-btn{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:var(--ink);color:var(--gold);border:none;padding:12px 28px;cursor:pointer;transition:background .2s}
.upload-btn:hover{background:var(--ink2)}
#file-input{display:none}

/* TREE */
.tree{flex:1;overflow:auto;text-align:center;background:var(--ivory);display:none;position:relative}
.tree::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(circle,rgba(12,15,20,.06) 1px,transparent 1px);background-size:28px 28px}
.tree-inner{display:inline-block;padding:48px 80px;text-align:left;transform-origin:top center;transition:transform .18s cubic-bezier(.22,1,.36,1);position:relative;z-index:1}

/* TREE STRUCTURE */
.org-node{display:flex;flex-direction:column;align-items:center}
.vline{width:1px;height:24px;background:linear-gradient(to bottom,var(--gold),rgba(196,151,58,.3));margin:0 auto;flex-shrink:0}
.org-row{display:flex;flex-direction:row;align-items:flex-start;justify-content:center;position:relative;padding-top:24px}
.org-row::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(to right,transparent,rgba(196,151,58,.4) 20%,rgba(196,151,58,.4) 80%,transparent)}
.org-col{display:flex;flex-direction:column;align-items:center;position:relative;padding:0 10px}
.org-col::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:1px;height:24px;background:linear-gradient(to bottom,rgba(196,151,58,.4),rgba(196,151,58,.2))}

/* STANDARD CARD */
.card{width:var(--card-w);flex-shrink:0;position:relative;background:var(--ivory);border:1px solid rgba(12,15,20,.1);box-shadow:0 1px 3px rgba(12,15,20,.06),0 4px 16px rgba(12,15,20,.06);transition:transform .18s cubic-bezier(.22,1,.36,1),box-shadow .18s cubic-bezier(.22,1,.36,1)}
.card:hover{transform:translateY(-3px);box-shadow:0 2px 8px rgba(12,15,20,.08),0 12px 32px rgba(12,15,20,.1)}
.card.hl{outline:2px solid var(--verm);outline-offset:2px}
.card-accent{position:absolute;top:0;left:0;bottom:0;width:3px}
.card-body{padding:10px 10px 10px 16px}
.card-name{font-family:'Syne',sans-serif;font-size:10.5px;font-weight:700;color:var(--ink);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.2px}
.card-role{font-family:'Spectral',serif;font-size:9px;font-weight:300;font-style:italic;color:var(--mist);line-height:1.5;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-svc{font-family:'Syne',sans-serif;font-size:7.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:5px;opacity:.7}
.badge{position:absolute;top:-9px;right:-9px;min-width:20px;height:20px;border-radius:10px;font-family:'Playfair Display',serif;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;color:var(--ivory);box-shadow:0 2px 8px rgba(12,15,20,.25);border:2px solid var(--ivory);z-index:10}

/* COMPACT CARD */
.mgr-compact{width:var(--cmp-w);flex-shrink:0;position:relative;background:var(--ivory);border:1px solid rgba(12,15,20,.1);box-shadow:0 1px 3px rgba(12,15,20,.06),0 4px 16px rgba(12,15,20,.06)}
.mgr-compact .card-head{padding:10px 10px 8px 16px;border-bottom:1px solid var(--rule);position:relative}
.mgr-compact .card-head .card-name{font-size:11px}
.mgr-compact .reports-list{padding:2px 0 4px}
.mgr-compact .badge{position:absolute;top:-9px;right:-9px;min-width:20px;height:20px;border-radius:10px;font-family:'Playfair Display',serif;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;color:var(--ivory);box-shadow:0 2px 8px rgba(12,15,20,.25);border:2px solid var(--ivory);z-index:10}
.report-item{padding:5px 10px 5px 14px;display:flex;align-items:flex-start;gap:8px;cursor:pointer;transition:background .1s;border-bottom:1px solid rgba(12,15,20,.04)}
.report-item:last-child{border:none}
.report-item:hover{background:rgba(196,151,58,.06)}
.report-item.hl-item{background:rgba(184,52,27,.04)}
.report-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}
.report-name{font-family:'Syne',sans-serif;font-size:9.5px;font-weight:600;color:var(--ink);line-height:1.3;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.report-poste{font-family:'Spectral',serif;font-size:8.5px;font-weight:300;font-style:italic;color:var(--mist);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.report-sub{font-family:'Playfair Display',serif;font-size:9px;font-weight:700;color:var(--gold);flex-shrink:0;margin-top:2px}

/* PANEL */
.overlay{position:fixed;inset:0;background:rgba(12,15,20,.35);backdrop-filter:blur(2px);z-index:490;display:none}
.overlay.open{display:block}
.panel{position:fixed;top:0;right:-440px;bottom:0;width:400px;background:var(--ink);z-index:500;transition:right .3s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column;overflow:hidden}
.panel.open{right:0}
.panel-header{padding:20px 20px 16px;border-bottom:1px solid rgba(196,151,58,.15);flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.panel-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ivory);line-height:1.2}
.panel-title-sub{font-family:'Syne',sans-serif;font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-top:4px}
.panel-close{background:rgba(247,244,238,.07);border:none;color:rgba(247,244,238,.5);width:26px;height:26px;cursor:pointer;font-size:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s}
.panel-close:hover{background:rgba(247,244,238,.14);color:var(--ivory)}
.panel-content{flex:1;overflow-y:auto;padding:16px 20px 24px}
.panel-content::-webkit-scrollbar{width:4px}
.panel-content::-webkit-scrollbar-thumb{background:rgba(247,244,238,.1)}
.panel-mgr-card{padding:14px 16px;border:1px solid rgba(196,151,58,.2);background:rgba(196,151,58,.04);margin-bottom:20px;position:relative}
.panel-mgr-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--gold)}
.panel-mgr-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--ivory)}
.panel-mgr-role{font-family:'Spectral',serif;font-size:12px;font-weight:300;font-style:italic;color:rgba(247,244,238,.5);margin-top:3px}
.panel-mgr-svc{font-family:'Syne',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:8px}
.panel-section-label{font-family:'Syne',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(247,244,238,.25);margin:16px 0 8px;display:flex;align-items:center;gap:10px}
.panel-section-label::after{content:'';flex:1;height:1px;background:rgba(247,244,238,.07)}
.panel-card{padding:10px 12px 10px 16px;background:rgba(247,244,238,.04);border:1px solid rgba(247,244,238,.07);margin-bottom:6px;cursor:pointer;transition:all .15s;position:relative}
.panel-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:2px;background:transparent;transition:background .15s}
.panel-card:hover{background:rgba(247,244,238,.08)}
.panel-card:hover::before{background:var(--gold)}
.panel-card-name{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;color:var(--ivory);display:flex;align-items:center;gap:6px}
.panel-card-role{font-family:'Spectral',serif;font-size:10px;font-weight:300;font-style:italic;color:rgba(247,244,238,.4);margin-top:2px}
.sub-count{font-family:'Playfair Display',serif;font-size:9px;font-weight:700;background:var(--gold);color:var(--ink);padding:1px 6px}
.empty{padding:80px 40px;text-align:center;font-family:'Spectral',serif;font-size:16px;font-weight:300;font-style:italic;color:var(--mist)}
.app{height:100vh;display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
</style>
</head>
<body>
<div class="app">

<header class="topbar">
  <div class="topbar-logo">Kit RH<span class="topbar-subtitle">Organigramme interactif</span></div>
  <span id="ts">Aucun fichier chargé</span>
</header>

<div class="main">
  <div class="nav" id="nav"></div>
  <div class="legend" id="lg"></div>
  <div class="statsbar" id="st"></div>
  <div class="zbar" id="zb">
    <button class="zbtn" onclick="zoom(-.1)">−</button>
    <span class="zlvl" id="zlvl">100%</span>
    <button class="zbtn" onclick="zoom(.1)">+</button>
    <button class="zbtn" onclick="resetZoom()" style="font-size:10px;font-family:'Syne',sans-serif;font-weight:700;width:auto;padding:0 8px">↺</button>
    <span class="zhint">raccourcis : + − 0</span>
  </div>

  <div class="upload-zone" id="upload-zone">
    <div class="upload-box" id="upload-box">
      <span class="upload-icon">◈</span>
      <div class="upload-title">Charger votre fichier</div>
      <p class="upload-sub">Glissez-déposez votre <strong>Répertoire_Salariés.xlsx</strong><br>ou cliquez pour sélectionner</p>
      <button class="upload-btn" onclick="document.getElementById('file-input').click()">Choisir le fichier</button>
    </div>
    <input type="file" id="file-input" accept=".xlsx,.xls" onchange="handleFile(this.files[0])">
  </div>

  <div class="tree" id="tree"><div class="tree-inner" id="tree-inner"></div></div>
</div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <div>
      <div class="panel-title" id="panel-title">Équipe</div>
      <div class="panel-title-sub" id="panel-sub"></div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-content" id="panel-content"></div>
</div>

</div>
<script>
var DATA=[],byId={},ch={},filter="Tous",search="",zoomLevel=1.0;
var SC={"Direction":{bar:"0C0F14",txt:"0C0F14"},"Commerce":{bar:"1A4A8C",txt:"1A4A8C"},"Logistique":{bar:"1A5C42",txt:"1A5C42"},"Finance":{bar:"7A2010",txt:"7A2010"},"RH":{bar:"6B2A6B",txt:"6B2A6B"},"Administratif":{bar:"8A5A1A",txt:"8A5A1A"},"IT":{bar:"3A2A8C",txt:"3A2A8C"},"Management":{bar:"2A5C5C",txt:"2A5C5C"},"Autre":{bar:"4A5468",txt:"4A5468"}};
var COMPACT_THRESHOLD=5;

function norm(s){return String(s||"").trim().toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^A-Z0-9]/g,"_").replace(/_+/g,"_").replace(/^_|_$/g,"")}
function familleToService(f){f=String(f||"").toLowerCase();if(f.indexOf("direction")>=0)return"Direction";if(f.indexOf("commerce")>=0||f.indexOf("vente")>=0)return"Commerce";if(f.indexOf("logistique")>=0||f.indexOf("opérations")>=0||f.indexOf("operations")>=0)return"Logistique";if(f.indexOf("finance")>=0||f.indexOf("comptabilit")>=0)return"Finance";if(f.trim()==="rh"||f.indexOf("ressources")>=0)return"RH";if(f.indexOf("administratif")>=0||f.indexOf("support")>=0)return"Administratif";if(f.trim()==="it"||f.indexOf("informatique")>=0)return"IT";if(f.indexOf("encadrement")>=0||f.indexOf("management")>=0)return"Management";return"Autre"}

function handleFile(f){if(!f)return;var r=new FileReader();r.onload=function(e){try{var wb=XLSX.read(e.target.result,{type:"array"});parseData(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:""}),f.name)}catch(err){alert("Erreur : "+err.message)}};r.readAsArrayBuffer(f)}
var box=document.getElementById("upload-box");
box.addEventListener("dragover",function(e){e.preventDefault();box.classList.add("dragover")});
box.addEventListener("dragleave",function(){box.classList.remove("dragover")});
box.addEventListener("drop",function(e){e.preventDefault();box.classList.remove("dragover");if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0])});

function parseData(rows,filename){
  var employees=[];var startRow=2;
  for(var i=0;i<Math.min(5,rows.length);i++){if(String(rows[i][0]||"").toLowerCase().trim()==="nom"){startRow=i+1;break}}
  for(var i=startRow;i<rows.length;i++){var r=rows[i];var nom=String(r[0]||"").trim();var prenom=String(r[1]||"").trim();if(!nom||nom.length>50)continue;employees.push({id:norm(nom)+"_"+norm(prenom),nom:nom,prenom:prenom,service:familleToService(String(r[4]||"")),mgrRaw:String(r[2]||"").trim(),poste:String(r[3]||"").trim(),mgrId:null})}
  var idx={};
  function addIdx(k,id){idx[k]=id;idx[k.replace(/_/g," ")]=id}
  employees.forEach(function(e){addIdx(norm(e.prenom+" "+e.nom),e.id);addIdx(norm(e.nom+" "+e.prenom),e.id);if(!idx[norm(e.nom)])addIdx(norm(e.nom),e.id)});
  employees.forEach(function(e){var n=norm(e.nom),p=norm(e.prenom);if(n.indexOf("HERB")>=0&&p.indexOf("EDOU")>=0){idx["EDOUARD_HEBERLE"]=e.id;idx["EDOUARD_HERBELE"]=e.id}});
  employees.forEach(function(e){var m=e.mgrRaw.trim();if(!m||m==="-")return;var k=norm(m);if(idx[k]){e.mgrId=idx[k];return}if(idx[k.replace(/_/g," ")]){e.mgrId=idx[k.replace(/_/g," ")];return}var parts=m.split(/\s+/);if(parts.length>=2){var inv=norm(parts.slice(1).join(" ")+" "+parts[0]);if(idx[inv]){e.mgrId=idx[inv];return}var pN=parts.map(function(p){return norm(p)});for(var key in idx){var kc=key.replace(/_/g," ");if(pN.every(function(p){return kc.indexOf(p.replace(/_/g," "))>=0})){e.mgrId=idx[key];return}}}});
  DATA=employees;byId={};ch={};
  DATA.forEach(function(d){byId[d.id]=d});
  DATA.forEach(function(d){if(d.mgrId){if(!ch[d.mgrId])ch[d.mgrId]=[];ch[d.mgrId].push(d.id)}});
  document.getElementById("upload-zone").style.display="none";
  ["nav","lg","st","zb"].forEach(function(id){document.getElementById(id).style.display="flex"});
  document.getElementById("tree").style.display="block";
  document.getElementById("ts").textContent="Fichier chargé · "+DATA.length+" salariés";
  buildNav();buildLegend();render();
}

function zoom(d){zoomLevel=Math.min(2,Math.max(.2,zoomLevel+d));applyZoom()}
function resetZoom(){zoomLevel=filter==="Tous"?.6:1.0;applyZoom()}
function applyZoom(){var i=document.getElementById("tree-inner");i.style.transform="scale("+zoomLevel+")";i.style.transformOrigin="top center";document.getElementById("zlvl").textContent=Math.round(zoomLevel*100)+"%"}
document.addEventListener("keydown",function(e){if(e.target.tagName==="INPUT")return;if(e.key==="+"||e.key==="=")zoom(.1);if(e.key==="-")zoom(-.1);if(e.key==="0")resetZoom()});

function color(d){return SC[d.service]||SC["Autre"]}
function matches(d){return filter==="Tous"||d.service===filter}
function isLeaf(id){return!(ch[id]&&ch[id].length>0)}
function svcRoot(svcIds){var tops=DATA.filter(function(d){return svcIds.has(d.id)&&(!d.mgrId||!svcIds.has(d.mgrId))});if(!tops.length)return null;tops.sort(function(a,b){return(ch[b.id]||[]).length-(ch[a.id]||[]).length});return tops[0]}

function openPanel(mgrId){
  var d=byId[mgrId];if(!d)return;
  var c=color(d);var kids=ch[mgrId]||[];
  document.getElementById("panel-title").textContent=d.prenom+" "+d.nom;
  document.getElementById("panel-sub").textContent=kids.length+" rapport"+(kids.length>1?"s directs":" direct");
  var pc=document.getElementById("panel-content");pc.innerHTML="";
  var mg=document.createElement("div");mg.className="panel-mgr-card";
  mg.innerHTML='<div class="panel-mgr-name">'+d.prenom+" "+d.nom+'</div><div class="panel-mgr-role">'+d.poste+'</div><div class="panel-mgr-svc" style="color:#'+c.bar+'">'+d.service+'</div>';
  pc.appendChild(mg);
  var sec=document.createElement("div");sec.className="panel-section-label";sec.textContent="Rapports directs";pc.appendChild(sec);
  kids.forEach(function(kid){
    var kd=byId[kid];if(!kd)return;var kc=color(kd);var sub=(ch[kid]||[]).length;
    var item=document.createElement("div");item.className="panel-card";
    item.innerHTML='<div class="panel-card-name">'+kd.prenom+" "+kd.nom+(sub>0?'<span class="sub-count">'+sub+'</span>':'')+'</div><div class="panel-card-role">'+kd.poste+'</div>';
    if(sub>0)item.onclick=function(){openPanel(kid)};
    pc.appendChild(item);
  });
  document.getElementById("panel").classList.add("open");
  document.getElementById("overlay").classList.add("open");
}
function closePanel(){document.getElementById("panel").classList.remove("open");document.getElementById("overlay").classList.remove("open")}

function mkCompactCard(id,vis,hl){
  var d=byId[id];if(!d)return null;var c=color(d);
  var allKids=ch[id]||[];var visKids=allKids.filter(function(k){return vis.has(k)});
  var wrap=document.createElement("div");wrap.className="org-node";
  var card=document.createElement("div");card.className="mgr-compact"+(hl.has(id)?" hl":"");
  var accent=document.createElement("div");accent.className="card-accent";accent.style.background="#"+c.bar;card.appendChild(accent);
  var head=document.createElement("div");head.className="card-head";
  head.innerHTML='<div class="card-name">'+d.prenom+" "+d.nom+'</div><div class="card-role">'+d.poste+'</div><div class="card-svc" style="color:#'+c.txt+'">'+d.service+'</div>';
  card.appendChild(head);
  var bk=document.createElement("span");bk.className="badge";bk.textContent=allKids.length;bk.style.background="#"+c.bar;card.appendChild(bk);
  var list=document.createElement("div");list.className="reports-list";
  visKids.forEach(function(kid){
    var kd=byId[kid];if(!kd)return;var kc=color(kd);var sub=(ch[kid]||[]).length;
    var item=document.createElement("div");item.className="report-item"+(hl.has(kid)?" hl-item":"");
    var dot=document.createElement("span");dot.className="report-dot";dot.style.background="#"+kc.bar;
    var nw=document.createElement("span");nw.className="report-name";
    var nd=document.createElement("div");nd.textContent=kd.prenom+" "+kd.nom;
    var rd=document.createElement("div");rd.className="report-poste";rd.textContent=kd.poste;
    nw.appendChild(nd);nw.appendChild(rd);item.appendChild(dot);item.appendChild(nw);
    if(sub>0){var se=document.createElement("span");se.className="report-sub";se.textContent=sub+" →";item.appendChild(se);item.style.cursor="pointer";item.onclick=function(){openPanel(kid)}}
    list.appendChild(item);
  });
  card.appendChild(list);wrap.appendChild(card);return wrap;
}

function mkCard(id,vis,hl){
  var d=byId[id];if(!d)return null;var c=color(d);
  var allKids=ch[id]||[];var visKids=allKids.filter(function(k){return vis.has(k)});
  if(visKids.length>COMPACT_THRESHOLD)return mkCompactCard(id,vis,hl);
  var wrap=document.createElement("div");wrap.className="org-node";
  var card=document.createElement("div");card.className="card"+(hl.has(id)?" hl":"");card.title=d.prenom+" "+d.nom+" — "+d.poste;
  var accent=document.createElement("div");accent.className="card-accent";accent.style.background="#"+c.bar;card.appendChild(accent);
  var body=document.createElement("div");body.className="card-body";
  body.innerHTML='<div class="card-name">'+d.prenom+" "+d.nom+'</div><div class="card-role">'+d.poste+'</div><div class="card-svc" style="color:#'+c.txt+'">'+d.service+'</div>';
  card.appendChild(body);
  if(allKids.length>0){var bk=document.createElement("span");bk.className="badge";bk.textContent=allKids.length;bk.style.background="#"+c.bar;card.appendChild(bk)}
  wrap.appendChild(card);
  if(visKids.length===0)return wrap;
  var vl=document.createElement("div");vl.className="vline";wrap.appendChild(vl);
  var row=document.createElement("div");row.className="org-row";
  visKids.forEach(function(kid){var col=document.createElement("div");col.className="org-col";var child=mkCard(kid,vis,hl);if(child)col.appendChild(child);row.appendChild(col)});
  wrap.appendChild(row);return wrap;
}

function render(){
  var hl=new Set();
  if(search){var s=search.toLowerCase();DATA.forEach(function(d){if((d.prenom+" "+d.nom+" "+d.poste).toLowerCase().indexOf(s)>=0)hl.add(d.id)})}
  var tw=document.getElementById("tree-inner");tw.innerHTML="";
  if(search&&hl.size===0){tw.innerHTML='<div class="empty">Aucun résultat pour "'+search+'"</div>';return}
  var vis,root;
  if(filter==="Tous"){
    vis=new Set(DATA.map(function(d){return d.id}));
    root=DATA.find(function(d){return d.nom.length<40&&(!d.mgrRaw||d.mgrRaw.trim()==="-"||d.mgrRaw.trim()==="")});
    if(!root){tw.innerHTML='<div class="empty">Racine introuvable — vérifiez la colonne Manager</div>';return}
    tw.appendChild(mkCard(root.id,vis,hl));
  }else{
    var svcIds=new Set(DATA.filter(function(d){return matches(d)}).map(function(d){return d.id}));
    if(svcIds.size===0){tw.innerHTML='<div class="empty">Aucun membre dans ce service</div>';return}
    vis=new Set(svcIds);
    
    // Trouver TOUTES les racines du service (membres dont le mgr est hors du service)
    var roots=DATA.filter(function(d){return svcIds.has(d.id)&&(!d.mgrId||!svcIds.has(d.mgrId))});
    if(!roots.length){tw.innerHTML='<div class="empty">Aucun membre dans ce service</div>';return}
    
    // Pour chaque racine, remonter la hiérarchie complète jusqu'au sommet
    roots.forEach(function(r){
      var cur=r.mgrId,hops=0;
      while(cur&&hops<12){vis.add(cur);cur=byId[cur]&&byId[cur].mgrId;hops++}
    });
    
    // Trouver l'ancêtre commun le plus haut
    // Chercher le plus haut nœud de vis qui englobe tous les membres du service
    var tops=Array.from(vis).filter(function(id){
      var d=byId[id];return!d.mgrId||!vis.has(d.mgrId);
    });
    
    if(tops.length===1){
      root=byId[tops[0]];
      tw.appendChild(mkCard(root.id,vis,hl));
    } else {
      // Plusieurs racines distinctes → afficher comme colonne verticale de sous-arbres
      var wrapper=document.createElement("div");
      wrapper.style.cssText="display:flex;flex-direction:column;align-items:center;gap:32px";
      tops.forEach(function(topId){
        var subVis=new Set();
        // Inclure topId et tous ses descendants qui sont dans vis
        function collectDesc(id){subVis.add(id);(ch[id]||[]).forEach(function(kid){if(vis.has(kid))collectDesc(kid)});}
        collectDesc(topId);
        var node=mkCard(topId,subVis,hl);
        if(node)wrapper.appendChild(node);
      });
      tw.appendChild(wrapper);
    }
  }
  var fc=DATA.filter(function(d){return matches(d)}).length;
  document.getElementById("st").innerHTML="<span><b>"+DATA.length+"</b> salariés</span><span><b>"+Object.keys(ch).length+"</b> managers</span>"+(filter!=="Tous"?"<span><b>"+fc+"</b> dans "+filter+"</span>":"");
  // Zoom adaptatif
  zoomLevel=filter==="Tous"?.6:1.0;applyZoom();
}

function buildNav(){
  var nav=document.getElementById("nav");nav.innerHTML="";
  var lbl=document.createElement("span");lbl.className="nav-lbl";lbl.textContent="Filtrer";nav.appendChild(lbl);
  ["Tous"].concat(Object.keys(SC)).forEach(function(s){
    var b=document.createElement("button");b.className="nbtn"+(s===filter?" on":"");
    b.textContent=s==="Tous"?"Vue globale":s;
    b.onclick=function(){filter=s;document.querySelectorAll(".nbtn").forEach(function(x){x.classList.remove("on")});b.classList.add("on");render()};
    nav.appendChild(b);
    if(s==="Tous"){var sep=document.createElement("div");sep.className="sep";nav.appendChild(sep)}
  });
  var rb=document.createElement("button");rb.className="reload-btn";rb.textContent="⟳ Autre fichier";
  rb.onclick=function(){document.getElementById("upload-zone").style.display="flex";document.getElementById("tree").style.display="none";["nav","lg","st","zb"].forEach(function(id){document.getElementById(id).style.display="none"});document.getElementById("ts").textContent="Aucun fichier chargé";DATA=[];byId={};ch={};filter="Tous";search=""};
  nav.appendChild(rb);
  var sw=document.createElement("div");sw.className="srch";
  var inp=document.createElement("input");inp.type="text";inp.placeholder="Rechercher...";inp.oninput=function(){search=this.value.trim();render()};
  sw.appendChild(inp);nav.appendChild(sw);
}

function buildLegend(){
  var lg=document.getElementById("lg");lg.innerHTML="";
  Object.keys(SC).forEach(function(s){
    var c=SC[s];var item=document.createElement("div");item.className="li";
    var dot=document.createElement("div");dot.className="ld";dot.style.background="#"+c.bar;
    var label=document.createElement("span");label.className="li-label";label.textContent=s;
    item.appendChild(dot);item.appendChild(label);lg.appendChild(item);
  });
}
</script>
